apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: yourdockerhubusername/restaurant-backend:v1

          ports:
            - containerPort: 4000

          envFrom:
            - secretRef:
                name: backend-secret